<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Weather Market</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#060c1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Barlow+Condensed:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #060c1a;
      --bg2:       #0b1428;
      --surface:   rgba(255,255,255,0.07);
      --surface2:  rgba(255,255,255,0.11);
      --border:    rgba(255,255,255,0.12);
      --border-hi: rgba(255,255,255,0.22);
      --gold:      #f0c040;
      --gold-dim:  rgba(240,192,64,0.13);
      --gold-line: rgba(240,192,64,0.30);
      --gold-glow: rgba(240,192,64,0.45);
      --text:      #eef3ff;
      --text2:     #c8d4ec;
      --muted:     #7888a4;
      --muted2:    #a0b2cc;
      --green:     #1ee882;
      --red:       #ff4c4c;
      --blue:      #4aaeff;
      --amber:     #ffb820;
      --grid:      rgba(255,255,255,0.035);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Radial gold haze ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 10%, rgba(240,192,64,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(14px, env(safe-area-inset-top)) 14px max(20px, env(safe-area-inset-bottom)) 14px;
    }

    .widget {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.65s cubic-bezier(.22,1,.36,1) both;
      padding-bottom: 16px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Glass Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 18%; right: 18%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      pointer-events: none;
    }

    /* ── Header ── */
    .header-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
      animation: livePulse 2.4s ease infinite;
    }

    @keyframes livePulse {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(30,232,130,.6); }
      60%      { opacity:.65; box-shadow: 0 0 0 6px rgba(30,232,130,0); }
    }

    .brand-name {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clock {
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      color: var(--text2);
      letter-spacing: 1px;
    }

    .install-btn {
      display: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid var(--gold-line);
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      text-transform: uppercase;
      min-height: 28px;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 44px 12px 42px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .search-input::placeholder { color: var(--muted); }

    .search-input:focus {
      border-color: var(--gold-line);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .search-input:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted2);
      font-size: 17px;
      pointer-events: none;
      line-height: 1;
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--muted2);
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
      display: none;
    }

    .search-clear.vis { display: flex; }

    .search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #0e1a2e;
      border: 1px solid var(--border-hi);
      border-radius: 12px;
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 24px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .search-dropdown.open { display: block; }

    .search-result {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-result:last-child { border-bottom: none; }
    .search-result:hover, .search-result:active { background: var(--surface2); }

    .sr-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      opacity: 0.55;
    }

    .sr-info { flex: 1; }
    .sr-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.3px; }
    .sr-sub  { font-size: 11px; color: var(--muted2); margin-top: 2px; }

    .search-msg {
      padding: 16px;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── City Tabs ── */
    .city-tabs {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .city-tabs::-webkit-scrollbar { display: none; }

    .city-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s;
      backdrop-filter: blur(16px);
    }

    .tab-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tab-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted2);
      text-transform: uppercase;
    }

    .tab-temp {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: var(--text2);
    }

    .tab-close {
      width: 15px; height: 15px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      line-height: 1;
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }

    .tab-close:hover { background: rgba(255,76,76,0.3); color: var(--red); }

    .tab-spin {
      width: 8px; height: 8px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .max-badge {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 30px;
      border: 1px solid rgba(255,76,76,0.25);
      background: rgba(255,76,76,0.07);
      flex-shrink: 0;
    }

    .max-badge-text {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--red);
      text-transform: uppercase;
    }

    /* ── Price Card ── */
    .ticker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .ticker-sym {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 3px;
    }

    .badge {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }
    .badge.up   { background: rgba(30,232,130,.12); color: var(--green); border: 1px solid rgba(30,232,130,.28); }
    .badge.down { background: rgba(255,76,76,.12);  color: var(--red);   border: 1px solid rgba(255,76,76,.28); }
    .badge.flat { background: var(--gold-dim);      color: var(--gold);  border: 1px solid var(--gold-line); }

    /* ── Animated Price Display ── */
    .price-display {
      text-align: center;
      padding: 10px 0 5px;
      line-height: 1;
      position: relative;
      user-select: none;
    }

    .price-neg {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 9vw, 40px);
      font-weight: 300;
      color: var(--red);
      vertical-align: top;
      line-height: 1.5;
    }

    .price-sym {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 300;
      vertical-align: top;
      line-height: 1.95;
    }

    .price-int {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(62px, 18vw, 88px);
      font-weight: 600;
      letter-spacing: -3px;
      background: linear-gradient(160deg, #eef3ff 0%, #7a90b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
      transition: filter 0.4s;
    }

    .price-int.flash {
      filter: brightness(1.6) drop-shadow(0 0 16px rgba(240,192,64,0.75));
    }

    .price-dec {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 9vw, 40px);
      font-weight: 300;
      color: var(--muted2);
    }

    .price-micro {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      display: block;
      margin-top: 3px;
      min-height: 14px;
    }

    .price-label {
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 5px;
    }

    @keyframes microFlux {
      0%   { opacity: 1; transform: translateY(0); }
      25%  { opacity: 0.5; transform: translateY(-1px); }
      75%  { opacity: 0.5; transform: translateY(1px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .price-dec.ticking {
      animation: microFlux 0.38s ease;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
      margin: 12px 0;
    }

    .sentiment-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .s-badge {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid currentColor;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .s-desc {
      font-size: 11px;
      color: var(--muted2);
      letter-spacing: 0.3px;
    }

    /* ── Metrics Grid ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }

    .m-label {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .m-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 600;
      line-height: 1;
    }

    .m-unit {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 400;
    }

    .m-sub {
      font-size: 8.5px;
      color: var(--muted2);
      margin-top: 5px;
      letter-spacing: 0.3px;
    }

    /* ── Comparison Panel ── */
    .comp-label {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .comp-rows { display: flex; flex-direction: column; gap: 11px; }

    .comp-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comp-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .comp-city {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--text2);
      text-transform: uppercase;
      width: 70px;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comp-bar-wrap {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .comp-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 1.2s cubic-bezier(.22,1,.36,1);
    }

    .comp-temp {
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      width: 44px;
      text-align: right;
      flex-shrink: 0;
      font-weight: 700;
    }

    .comp-delta {
      font-family: 'Courier Prime', monospace;
      font-size: 9px;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Forecast Chart ── */
    .f-label {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 13px;
    }

    .f-bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 60px;
    }

    .f-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      gap: 3px;
    }

    .f-temp { font-family: 'Courier Prime', monospace; font-size: 8px; color: var(--text2); }

    .f-bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(to top, rgba(240,192,64,.85), rgba(240,192,64,.1));
    }

    .f-time { font-size: 8px; color: var(--muted); }

    /* ── Ticker Tape ── */
    .ticker-tape {
      overflow: hidden;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      padding: 7px 0;
    }

    .ticker-inner {
      display: flex;
      width: max-content;
      animation: scroll 32s linear infinite;
    }

    .t-item {
      font-family: 'Courier Prime', monospace;
      font-size: 9px;
      color: var(--muted2);
      letter-spacing: 1px;
      padding: 0 16px;
    }

    .t-sep { color: var(--gold); opacity: 0.5; padding: 0; }

    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Loading / Error States ── */
    .loading-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 52px 24px;
      text-align: center;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loading-text {
      font-size: 9px;
      letter-spacing: 3.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .error-card { padding: 36px 24px; text-align: center; }
    .e-title { font-size: 10px; color: var(--red); letter-spacing: 2.5px; margin-bottom: 10px; text-transform: uppercase; }
    .e-msg { font-size: 12px; color: var(--muted2); line-height: 1.6; margin-bottom: 20px; }

    .retry-btn {
      background: var(--gold-dim);
      border: 1px solid var(--gold-line);
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .retry-btn:hover {
      background: rgba(240,192,64,0.22);
      box-shadow: 0 0 20px rgba(240,192,64,0.15);
    }

    @media (max-width: 380px) {
      .card { padding: 13px 14px; }
      .metric { padding: 11px 12px; }
      .price-int { font-size: clamp(52px, 16vw, 74px); }
    }

    @media (max-height: 600px) and (orientation: landscape) {
      #app { align-items: flex-start; }
      .widget { gap: 7px; }
      .price-display { padding: 4px 0 3px; }
      .price-int { font-size: clamp(40px, 11vh, 58px); }
      .f-bars { height: 42px; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="widget">
    <div class="card loading-card">
      <div class="spinner"></div>
      <div class="loading-text">OPENING MARKET...</div>
    </div>
  </div>
</div>

<script>
  // ── PWA ──────────────────────────────────────────────────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('install-btn');
    if (btn) btn.style.display = 'block';
  });

  function installApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ── State ────────────────────────────────────────────────
  const MAX_CITIES  = 3;
  const CITY_COLORS = ['#f0c040', '#1ee882', '#4aaeff'];

  let cities     = [];
  let activeIdx  = 0;
  let clockTimer = null, refreshTimer = null, microTimer = null, searchTimer = null;
  let _uid       = 0;
  const uid      = () => ++_uid;

  // ── WMO Code Map ─────────────────────────────────────────
  const WMO = {
    0:  { label:'BULL MARKET',     desc:'Clear skies · Maximum returns',     cls:'up',   col:'#1ee882' },
    1:  { label:'BULL MARKET',     desc:'Mainly clear · Strong session',      cls:'up',   col:'#1ee882' },
    2:  { label:'STEADY MARKET',   desc:'Partly cloudy · Holding ground',     cls:'flat', col:'#f0c040' },
    3:  { label:'SIDEWAYS TREND',  desc:'Overcast · Uncertain direction',      cls:'flat', col:'#f0c040' },
    45: { label:'LOW VISIBILITY',  desc:'Foggy · Wait and watch',             cls:'flat', col:'#f0c040' },
    48: { label:'LOW VISIBILITY',  desc:'Icy fog · Risk-off mode',            cls:'flat', col:'#f0c040' },

  };

  function wmo(code) {
    return WMO[code] || { label:'MONITORING', desc:'Analysing conditions...', cls:'flat', col:'#f0c040' };
  }

  function uvLabel(uv) {
    if (uv <= 2)  return 'LOW';
    if (uv <= 5)  return 'MODERATE';
    if (uv <= 7)  return 'HIGH';
    if (uv <= 10) return 'VERY HIGH';
    return 'EXTREME';
  }

  // ── APIs ─────────────────────────────────────────────────
  async function geocodeSearch(q) {
    const r = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`
    );
    if (!r.ok) throw new Error('Geocoding failed');
    const d = await r.json();
    return d.results || [];
  }

  async function reverseGeocode(lat, lng) {
    try {
      const r = await fetch(
        `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`
      );
      const d = await r.json();
      return {
        name:    (d.city || d.locality || d.principalSubdivision || 'My Location').toUpperCase(),
        country: d.countryCode || ''
      };
    } catch {
      return { name:'MY LOCATION', country:'' };
    }
  }

  async function fetchWeather(lat, lng) {
    const url = `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${lat}&longitude=${lng}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code,uv_index` +
      `&hourly=temperature_2m&timezone=auto&forecast_days=1`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('Weather unavailable');
    return r.json();
  }

  // ── Temperature Animation Engine ─────────────────────────
  const _anims = {};

  function animateCounter(cityId, fromVal, toVal, duration) {
    duration = duration || 1150;
    if (_anims[cityId]) cancelAnimationFrame(_anims[cityId]);
    const start = performance.now();
    const delta = toVal - fromVal;

    function step(now) {
      const t    = Math.min((now - start) / duration, 1);
      // Elastic ease-out — natural overshoot for "live ticker" feel
      const ease = t === 1 ? 1
        : 1 - Math.pow(2, -10 * t) * Math.cos((t * 10 - 0.75) * (2 * Math.PI) / 3);
      const cur  = fromVal + delta * ease;
      updateTempDOM(cityId, cur);
      if (t < 1) {
        _anims[cityId] = requestAnimationFrame(step);
      } else {
        delete _anims[cityId];
        updateTempDOM(cityId, toVal);
        flashTemp(cityId);
      }
    }
    _anims[cityId] = requestAnimationFrame(step);
  }

  function updateTempDOM(cityId, val) {
    const intEl  = document.getElementById('ti-' + cityId);
    const decEl  = document.getElementById('td-' + cityId);
    const signEl = document.getElementById('ts-' + cityId);
    if (!intEl || !decEl) return;
    const abs = Math.abs(val);
    intEl.textContent = Math.floor(abs);
    // Show 2 decimal places (e.g. .47) — enough to see tiny changes
    decEl.textContent = '.' + (abs % 1).toFixed(4).slice(2, 4);
    if (signEl) signEl.style.display = val < 0 ? 'inline' : 'none';
  }

  function flashTemp(cityId) {
    const intEl = document.getElementById('ti-' + cityId);
    if (!intEl) return;
    intEl.classList.add('flash');
    setTimeout(function() { intEl.classList.remove('flash'); }, 500);
  }

  // Micro-flux: subtle live-data animation every ~4 seconds on active city
  function startMicroFlux() {
    if (microTimer) clearInterval(microTimer);
    microTimer = setInterval(function() {
      const city = cities[activeIdx];
      if (!city || !city.weather || _anims[city.id]) return;
      const actual = city.weather.current.temperature_2m;
      // Tiny simulated fluctuation: ±0.009°
      const micro = actual + (Math.random() - 0.5) * 0.018;
      const decEl = document.getElementById('td-' + city.id);
      if (decEl) {
        const abs = Math.abs(micro);
        decEl.textContent = '.' + (abs % 1).toFixed(4).slice(2, 4);
        decEl.classList.remove('ticking');
        void decEl.offsetWidth;
        decEl.classList.add('ticking');
        setTimeout(function() { updateTempDOM(city.id, actual); }, 420);
      }
      // Update micro display line
      const microEl = document.getElementById('tm-' + city.id);
      if (microEl) {
        const s   = micro >= 0 ? '+' : '−';
        const abs2 = Math.abs(micro);
        const d4  = (abs2 % 1).toFixed(4).slice(1); // ".XXXX"
        microEl.textContent = 'LIVE  ' + s + Math.floor(abs2) + d4 + ' °C';
      }
    }, 3800);
  }

  // ── Clock ─────────────────────────────────────────────────
  function startClock() {
    if (clockTimer) clearInterval(clockTimer);
    tickClock();
    clockTimer = setInterval(tickClock, 1000);
  }

  function tickClock() {
    var el = document.getElementById('clk');
    if (!el) return;
    el.textContent = new Date().toLocaleTimeString('en-IN', {
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
    });
  }

  // ── City Management ───────────────────────────────────────
  async function addCurrentLocation() {
    try {
      const pos = await new Promise(function(ok, fail) {
        if (!navigator.geolocation) return fail(new Error('Geolocation not supported'));
        navigator.geolocation.getCurrentPosition(ok, fail, { timeout:12000 });
      });
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const geo = await reverseGeocode(lat, lng);
      addCity({ name:geo.name, country:geo.country, lat:lat, lng:lng, isHome:true });
    } catch(e) {
      renderSearchOnlyState();
    }
  }

  function addCity(info) {
    if (cities.length >= MAX_CITIES) return;
    // Deduplicate by proximity (~5km)
    for (var i = 0; i < cities.length; i++) {
      if (Math.abs(cities[i].lat - info.lat) < 0.05 &&
          Math.abs(cities[i].lng - info.lng) < 0.05) return;
    }
    var city = {
      id:          uid(),
      name:        info.name.toUpperCase().trim(),
      country:    (info.country || '').toUpperCase(),
      lat:         info.lat,
      lng:         info.lng,
      weather:     null,
      prevTemp:    null,
      animFrom:    null,
      loading:     true,
      error:       null,
      isHome:      !!info.isHome,
      colorIdx:    cities.length % 3
    };
    cities.push(city);
    activeIdx = cities.length - 1;
    render();
    loadCity(city.id);
  }

  async function loadCity(cityId) {
    var city = cities.find(function(c) { return c.id === cityId; });
    if (!city) return;
    try {
      var weather  = await fetchWeather(city.lat, city.lng);
      var newTemp  = weather.current.temperature_2m;
      var fromTemp = city.prevTemp !== null ? city.prevTemp : newTemp;
      city.weather  = weather;
      city.loading  = false;
      city.error    = null;
      city.animFrom = fromTemp;
      city.prevTemp = newTemp;
    } catch(e) {
      city.loading = false;
      city.error   = 'Market data unavailable. Please retry.';
    }
    render();
    // Kick off animation after DOM paint
    requestAnimationFrame(function() {
      cities.forEach(function(c) {
        if (c.animFrom !== null && c.prevTemp !== null) {
          if (Math.abs(c.animFrom - c.prevTemp) > 0.00005) {
            animateCounter(c.id, c.animFrom, c.prevTemp);
          } else {
            updateTempDOM(c.id, c.prevTemp);
            flashTemp(c.id);
          }
          c.animFrom = null;
        }
      });
    });
  }

  function removeCity(cityId) {
    if (_anims[cityId]) { cancelAnimationFrame(_anims[cityId]); delete _anims[cityId]; }
    var idx = cities.findIndex(function(c) { return c.id === cityId; });
    if (idx === -1) return;
    cities.splice(idx, 1);
    cities.forEach(function(c, i) { c.colorIdx = i % 3; });
    if (activeIdx >= cities.length) activeIdx = Math.max(0, cities.length - 1);
    render();
  }

  function setActive(idx) {
    activeIdx = idx;
    render();
    requestAnimationFrame(function() {
      var c = cities[idx];
      if (c && c.prevTemp !== null) updateTempDOM(c.id, c.prevTemp);
    });
  }

  function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(function() {
      cities.forEach(function(c) { if (!c.loading) loadCity(c.id); });
    }, 600000);
  }

  // ── Search ────────────────────────────────────────────────
  var _searchResults = [];

  function onSearchInput(val) {
    if (searchTimer) clearTimeout(searchTimer);
    var dropdown = document.getElementById('sd');
    var clearBtn = document.getElementById('sc');
    if (clearBtn) clearBtn.classList.toggle('vis', val.length > 0);

    if (!val || val.trim().length < 2) {
      _searchResults = [];
      if (dropdown) { dropdown.innerHTML = ''; dropdown.classList.remove('open'); }
      return;
    }

    if (dropdown) {
      dropdown.innerHTML = '<div class="search-msg">SEARCHING MARKETS...</div>';
      dropdown.classList.add('open');
    }

    searchTimer = setTimeout(async function() {
      try {
        var results = await geocodeSearch(val.trim());
        _searchResults = results;
        renderDropdown(results, dropdown);
      } catch(e) {
        if (dropdown) dropdown.innerHTML = '<div class="search-msg">SEARCH FAILED — TRY AGAIN</div>';
      }
    }, 280);
  }

  function renderDropdown(results, dropdown) {
    if (!dropdown) return;
    if (!results || !results.length) {
      dropdown.innerHTML = '<div class="search-msg">NO MARKETS FOUND</div>';
      dropdown.classList.add('open');
      return;
    }
    dropdown.innerHTML = results.slice(0,5).map(function(r, i) {
      var sub = [r.admin1, r.country].filter(Boolean).join(', ');
      return '<div class="search-result" onclick="selectResult(' + i + ')">' +
        '<div class="sr-dot"></div>' +
        '<div class="sr-info">' +
          '<div class="sr-name">' + r.name + (r.country_code ? ', ' + r.country_code : '') + '</div>' +
          (sub ? '<div class="sr-sub">' + sub + '</div>' : '') +
        '</div></div>';
    }).join('');
    dropdown.classList.add('open');
  }

  function selectResult(idx) {
    var r = _searchResults[idx];
    if (!r) return;
    closeSearch();
    if (cities.length >= MAX_CITIES) return;
    addCity({
      name:    r.name,
      country: r.country_code || r.country || '',
      lat:     r.latitude,
      lng:     r.longitude
    });
  }

  function closeSearch() {
    var input = document.getElementById('si');
    var dropdown = document.getElementById('sd');
    var clearBtn = document.getElementById('sc');
    if (input)    input.value = '';
    if (dropdown) { dropdown.innerHTML = ''; dropdown.classList.remove('open'); }
    if (clearBtn) clearBtn.classList.remove('vis');
    _searchResults = [];
  }

  function clearSearch() {
    closeSearch();
    var si = document.getElementById('si');
    if (si) si.focus();
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    var app = document.getElementById('app');
    if (!app) return;

    if (!cities.length) {
      app.innerHTML = '<div class="widget"><div class="card loading-card"><div class="spinner"></div><div class="loading-text">OPENING MARKET...</div></div></div>';
      return;
    }

    var city = cities[activeIdx] || cities[0];
    var parts = [
      renderHeader(),
      renderSearch(),
      renderTabs(),
      renderPriceCard(city),
      (!city.loading && !city.error && city.weather) ? renderMetrics(city) : '',
      (cities.filter(function(c) { return c.weather && !c.loading; }).length >= 2) ? renderComparison() : '',
      (!city.loading && !city.error && city.weather) ? renderForecast(city) : '',
      (!city.loading && !city.error && city.weather) ? renderTicker(city) : '',
    ];
    app.innerHTML = '<div class="widget">' + parts.join('') + '</div>';
    startClock();
    if (deferredPrompt) {
      var b = document.getElementById('install-btn');
      if (b) b.style.display = 'block';
    }
    startMicroFlux();
  }

  function renderHeader() {
    return '<div class="card header-card">' +
      '<div class="brand"><div class="live-dot"></div><div class="brand-name">◈ &nbsp;Weather Market</div></div>' +
      '<div class="header-right">' +
        '<div class="clock" id="clk">--:--:--</div>' +
        '<button class="install-btn" id="install-btn" onclick="installApp()">⬇ INSTALL</button>' +
      '</div>' +
    '</div>';
  }

  function renderSearch() {
    var atMax = cities.length >= MAX_CITIES;
    return '<div class="search-wrap">' +
      '<span class="search-icon">⌕</span>' +
      '<input type="text" id="si" class="search-input"' +
        ' placeholder="' + (atMax ? '◈  MAX 3 CITIES — REMOVE ONE TO ADD MORE' : 'SEARCH ANY CITY TO COMPARE...') + '"' +
        (atMax ? ' disabled' : '') +
        ' oninput="onSearchInput(this.value)"' +
        ' onblur="setTimeout(closeSearch, 200)"' +
        ' autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />' +
      '<button class="search-clear" id="sc" onclick="clearSearch()">✕</button>' +
      '<div class="search-dropdown" id="sd"></div>' +
    '</div>';
  }

  function renderTabs() {
    var atMax = cities.length >= MAX_CITIES;
    var tabs  = cities.map(function(c, i) {
      var isActive  = (i === activeIdx);
      var col       = CITY_COLORS[c.colorIdx];
      var tempStr   = c.weather ? c.weather.current.temperature_2m.toFixed(1) + '°'
                    : c.loading ? '···' : '—';
      var canClose  = cities.length > 1;
      var activeStyle = isActive
        ? 'border-color:' + col + '30;background:' + col + '12'
        : '';
      return '<div class="city-tab' + (isActive ? ' active' : '') + '" onclick="setActive(' + i + ')" style="' + activeStyle + '">' +
        (c.loading
          ? '<div class="tab-spin"></div>'
          : '<div class="tab-dot" style="background:' + col + '"></div>') +
        '<span class="tab-name" style="' + (isActive ? 'color:' + col : '') + '">' + c.name.slice(0,10) + '</span>' +
        '<span class="tab-temp">' + tempStr + '</span>' +
        (canClose ? '<button class="tab-close" onclick="event.stopPropagation();removeCity(' + c.id + ')">✕</button>' : '') +
      '</div>';
    }).join('');
    var maxBadge = atMax ? '<div class="max-badge"><span class="max-badge-text">MAX 3</span></div>' : '';
    return '<div class="city-tabs">' + tabs + maxBadge + '</div>';
  }

  function renderPriceCard(city) {
    if (city.loading) {
      return '<div class="card loading-card"><div class="spinner"></div><div class="loading-text">LOADING ' + city.name.slice(0,12) + '...</div></div>';
    }
    if (city.error) {
      return '<div class="card error-card"><div class="e-title">MARKET DISRUPTION</div><div class="e-msg">' + city.error + '</div><button class="retry-btn" onclick="loadCity(' + city.id + ')">↺ &nbsp;RETRY</button></div>';
    }

    var c      = city.weather.current;
    var temp   = c.temperature_2m;
    var code   = c.weather_code;
    var info   = wmo(code);
    var hourly = city.weather.hourly;
    var hNow   = new Date().getHours();
    var h6     = Math.max(0, hNow - 6);
    var chg    = +(temp - (hourly.temperature_2m[h6] || temp)).toFixed(1);
    var sign   = chg >= 0 ? '+' : '';
    var col    = CITY_COLORS[city.colorIdx];

    // Use animFrom for the initial render value (animation will count from here)
    var displayVal = (city.animFrom !== null && city.animFrom !== undefined) ? city.animFrom : temp;
    var abs    = Math.abs(displayVal);
    var tInt   = Math.floor(abs);
    var tDec   = '.' + (abs % 1).toFixed(4).slice(2, 4);
    var neg    = displayVal < 0;

    return '<div class="card">' +
      '<div class="ticker-row">' +
        '<span class="ticker-sym">WTH / ' + (city.country || 'GLB') + '</span>' +
        '<span class="badge ' + info.cls + '">' + sign + chg + '° &nbsp;6H</span>' +
      '</div>' +
      '<div class="price-display">' +
        '<span class="price-neg" id="ts-' + city.id + '" style="display:' + (neg ? 'inline' : 'none') + '">&minus;</span>' +
        '<span class="price-sym" style="color:' + col + '">°C</span>' +
        '<span class="price-int" id="ti-' + city.id + '">' + tInt + '</span>' +
        '<span class="price-dec" id="td-' + city.id + '">' + tDec + '</span>' +
        '<span class="price-micro" id="tm-' + city.id + '">LIVE  +' + tInt + tDec + ' °C</span>' +
      '</div>' +
      '<div class="price-label">Temperature Index &nbsp;·&nbsp; ' + city.name + '</div>' +
      '<div class="divider"></div>' +
      '<div class="sentiment-row">' +
        '<span class="s-badge" style="color:' + info.col + '">' + info.label + '</span>' +
        '<span class="s-desc">' + info.desc + '</span>' +
      '</div>' +
    '</div>';
  }

  function renderMetrics(city) {
    var c        = city.weather.current;
    var humidity = c.relative_humidity_2m;
    var wind     = c.wind_speed_10m;
    var uv       = c.uv_index || 0;
    var feels    = c.apparent_temperature;
    var uvColor  = uv > 7 ? 'var(--red)' : uv > 4 ? 'var(--amber)' : 'var(--green)';
    return '<div class="metrics-grid">' +
      '<div class="metric">' +
        '<div class="m-label">Liquidity Pool</div>' +
        '<div class="m-value" style="color:var(--blue)">' + humidity + '<span class="m-unit">%</span></div>' +
        '<div class="m-sub">Humidity · Market fluidity</div>' +
      '</div>' +
      '<div class="metric">' +
        '<div class="m-label">Volatility Index</div>' +
        '<div class="m-value" style="color:var(--gold)">' + wind + '<span class="m-unit"> km/h</span></div>' +
        '<div class="m-sub">Wind Speed · Turbulence</div>' +
      '</div>' +
      '<div class="metric">' +
        '<div class="m-label">UV Exposure</div>' +
        '<div class="m-value" style="color:' + uvColor + '">' + uv + '<span class="m-unit"> UV</span></div>' +
        '<div class="m-sub">' + uvLabel(uv) + ' · Risk level</div>' +
      '</div>' +
      '<div class="metric">' +
        '<div class="m-label">Adjusted Value</div>' +
        '<div class="m-value" style="color:var(--text)">' + feels.toFixed(1) + '°</div>' +
        '<div class="m-sub">Feels Like · Adj. price</div>' +
      '</div>' +
    '</div>';
  }

  function renderComparison() {
    var loaded = cities.filter(function(c) { return c.weather && !c.loading && !c.error; });
    if (loaded.length < 2) return '';

    var temps = loaded.map(function(c) { return c.weather.current.temperature_2m; });
    var minT  = Math.min.apply(null, temps);
    var maxT  = Math.max.apply(null, temps);
    var rng   = maxT - minT || 1;

    var maxCity = loaded.reduce(function(a, b) {
      return a.weather.current.temperature_2m >= b.weather.current.temperature_2m ? a : b;
    });

    var rows = loaded.map(function(c) {
      var t     = c.weather.current.temperature_2m;
      var pct   = ((t - minT) / rng) * 80 + 8;
      var col   = CITY_COLORS[c.colorIdx];
      var delta = t - maxCity.weather.current.temperature_2m;
      var dSign = delta >= 0 ? '+' : '';
      var dCol  = delta >= 0 ? 'var(--green)' : 'var(--red)';
      return '<div class="comp-row">' +
        '<div class="comp-dot" style="background:' + col + '"></div>' +
        '<div class="comp-city">' + c.name.slice(0,9) + '</div>' +
        '<div class="comp-bar-wrap"><div class="comp-bar" style="width:' + pct + '%;background:' + col + '"></div></div>' +
        '<div class="comp-temp" style="color:' + col + '">' + t.toFixed(1) + '°</div>' +
        '<div class="comp-delta" style="color:' + dCol + '">' + dSign + delta.toFixed(1) + '°</div>' +
      '</div>';
    }).join('');

    return '<div class="card">' +
      '<div class="comp-label">◈ &nbsp;Market Comparison &nbsp;·&nbsp; Temperature Index</div>' +
      '<div class="comp-rows">' + rows + '</div>' +
    '</div>';
  }

  function renderForecast(city) {
    var hourly  = city.weather.hourly;
    var temp    = city.weather.current.temperature_2m;
    var hNow    = new Date().getHours();
    var fcHours = [];
    for (var i = hNow + 1; i <= Math.min(hNow + 6, 23); i++) {
      fcHours.push({ h: String(i).padStart(2,'0'), t: hourly.temperature_2m[i] || temp });
    }
    if (!fcHours.length) return '';

    var allT = fcHours.map(function(f) { return f.t; });
    var minT = Math.min.apply(null, allT.concat([temp - 0.1]));
    var maxT = Math.max.apply(null, allT.concat([temp + 0.1]));
    var rng  = maxT - minT || 1;

    var bars = fcHours.map(function(f) {
      var h = Math.round(((f.t - minT) / rng) * 46 + 6);
      return '<div class="f-col">' +
        '<span class="f-temp">' + f.t.toFixed(0) + '°</span>' +
        '<div class="f-bar" style="height:' + h + 'px"></div>' +
        '<span class="f-time">' + f.h + 'H</span>' +
      '</div>';
    }).join('');

    return '<div class="card">' +
      '<div class="f-label">6-Hour Price Chart &nbsp;·&nbsp; °C</div>' +
      '<div class="f-bars">' + bars + '</div>' +
    '</div>';
  }

  function renderTicker(city) {
    var c      = city.weather.current;
    var temp   = c.temperature_2m;
    var hourly = city.weather.hourly;
    var hNow   = new Date().getHours();
    var h6     = Math.max(0, hNow - 6);
    var chg    = +(temp - (hourly.temperature_2m[h6] || temp)).toFixed(1);
    var sign   = chg >= 0 ? '+' : '';
    var info   = wmo(c.weather_code);

    var cityItems = cities
      .filter(function(c2) { return c2.weather && !c2.loading; })
      .map(function(c2) { return c2.name.slice(0,8) + '  ' + c2.weather.current.temperature_2m.toFixed(2) + '°C'; });

    var items = cityItems.concat([
      'CHANGE  ' + sign + chg + '° · 6H',
      'LIQUIDITY  ' + c.relative_humidity_2m + '%',
      'VOLATILITY  ' + c.wind_speed_10m + ' KM/H',
      'UV INDEX  ' + (c.uv_index || 0) + ' · ' + uvLabel(c.uv_index || 0),
      'FEELS LIKE  ' + c.apparent_temperature.toFixed(1) + '°C',
      info.label,
    ]);

    var tHtml = (items.map(function(s) {
      return '<span class="t-item">' + s + '</span><span class="t-item t-sep">◈</span>';
    }).join('')).repeat(2);

    return '<div class="ticker-tape"><div class="ticker-inner">' + tHtml + '</div></div>';
  }

  function renderSearchOnlyState() {
    document.getElementById('app').innerHTML =
      '<div class="widget">' +
        '<div class="card" style="padding:32px 20px;text-align:center">' +
          '<div class="brand-name" style="margin-bottom:12px">◈ &nbsp;Weather Market</div>' +
          '<div class="e-title">LOCATION ACCESS NEEDED</div>' +
          '<div class="e-msg" style="margin-bottom:0">Enable location access to auto-load your city, or search below.</div>' +
          '<div class="search-wrap" style="margin-top:18px">' +
            '<span class="search-icon">⌕</span>' +
            '<input type="text" id="si" class="search-input" placeholder="SEARCH YOUR CITY TO BEGIN..."' +
              ' oninput="onSearchInput(this.value)"' +
              ' onblur="setTimeout(closeSearch, 200)"' +
              ' autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />' +
            '<div class="search-dropdown" id="sd"></div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    await addCurrentLocation();
    startAutoRefresh();
  }

  init();
</script>
</body>
</html>
