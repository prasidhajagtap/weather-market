<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Weather Market Terminal</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0a08" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Barlow+Condensed:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #050403; /* Deeper black for better contrast */
      --gold: #ffcc33;
      --gold-deep: #c9a84c;
      --cream: #ffffff; /* Brighter for readability */
      --muted: #a09484; /* Lighter muted tone */
      --glass: rgba(15, 12, 10, 0.85); /* More opaque for text backing */
      --green: #00ff88;
      --red: #ff4444;
    }

    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background: var(--bg); 
      color: var(--cream);
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
    }

    /* ── Money Sky Background ─────────── */
    #sky-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 50%, #1a160d 0%, #050403 100%);
    }

    .celestial-asset {
      position: absolute;
      font-size: 60px;
      filter: drop-shadow(0 0 20px var(--gold));
      transition: all 1s ease-in-out;
      z-index: 1;
    }

    .money-cloud {
      position: absolute;
      font-family: 'Courier Prime', monospace;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 5px 15px;
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      border-radius: 4px;
      animation: float 20s linear infinite;
    }

    @keyframes float {
      from { transform: translateX(110vw); }
      to { transform: translateX(-110%;); }
    }

    /* ── UI Layout ─────────── */
    #app {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .search-container {
      width: 100%;
      max-width: 400px;
      margin-bottom: 15px;
    }

    .terminal-input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--gold-deep);
      padding: 12px 15px;
      color: var(--gold);
      font-family: 'Courier Prime', monospace;
      border-radius: 8px;
      outline: none;
      text-transform: uppercase;
      font-size: 13px;
    }

    .card {
      background: var(--glass);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      padding: 20px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .price-int {
      font-family: 'Cormorant Garamond', serif;
      font-size: 80px;
      font-weight: 600;
      color: var(--cream);
      line-height: 1;
    }

    /* Standardized typography for readability */
    .m-label { font-size: 10px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; font-weight: 700; }
    .m-value { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--cream); }
    .m-sub { font-size: 11px; color: var(--muted); }

    .badge {
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 12px;
    }
    .up { background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid var(--green); }
    .down { background: rgba(255, 68, 68, 0.1); color: var(--red); border: 1px solid var(--red); }

  </style>
</head>
<body>

<div id="sky-layer"></div>

<div id="app">
  <div class="search-container">
    <input type="text" class="terminal-input" id="citySearch" placeholder="SEARCH CITY TERMINAL..." onkeypress="handleSearch(event)">
  </div>
  <div id="main-content" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    </div>
</div>

<script>
  // ── Background Engine ────────────────────────────────
  function updateBackground(code, temp) {
    const sky = document.getElementById('sky-layer');
    sky.innerHTML = ''; // Clear previous frame

    // 1. Position the "Gold Sun/Moon"
    const hour = new Date().getHours();
    const isDay = hour > 6 && hour < 18;
    const xPos = ((hour - 6) / 12) * 80 + 10; // 10% to 90%
    const yPos = 20; 

    const celestial = document.createElement('div');
    celestial.className = 'celestial-asset';
    celestial.style.left = `${xPos}%`;
    celestial.style.top = `${yPos}%`;
    celestial.innerHTML = isDay ? '🟡' : '🔘'; // Gold Coin vs Silver Coin
    sky.appendChild(celestial);

    // 2. Weather Elements as Money
    if (code >= 1 && code <= 3) { // Cloudy -> Floating Ticker Tapes
      for(let i=0; i<5; i++) {
        const cloud = document.createElement('div');
        cloud.className = 'money-cloud';
        cloud.style.top = `${20 + (i*15)}%`;
        cloud.style.animationDuration = `${15 + (Math.random()*10)}s`;
        cloud.textContent = `BTC +2.4% ... USD/INR 83.2 ... WTH BULLISH ...`;
        sky.appendChild(cloud);
      }
    }

    if (code >= 51) { // Rain -> Falling "Cash"
      // Particle logic would go here
    }
  }

  // ── Search Logic ─────────────────────────────────────
  async function handleSearch(e) {
    if (e.key === 'Enter') {
      const city = e.target.value;
      try {
        const geoR = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`);
        const geoD = await geoR.json();
        if (geoD.results) {
          const { latitude, longitude, name } = geoD.results;
          fetchAndRender(latitude, longitude, name.toUpperCase());
        }
      } catch (err) {
        console.error("Search failed", err);
      }
    }
  }

  async function fetchAndRender(lat, lng, cityName) {
    // Re-use your existing getWeather logic here
    const weather = await getWeather(lat, lng);
    renderWidget(weather, cityName);
    updateBackground(weather.current.weather_code, weather.current.temperature_2m);
  }

  // (Helper functions for getWeather, wmo, etc. remain same as previous version)
  // ... [Include previous helper functions here] ...

  async function init() {
    // Default to Geolocation
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude, longitude } = pos.coords;
      const city = await getCity(latitude, longitude);
      fetchAndRender(latitude, longitude, city);
    });
  }

  init();
</script>
</body>
</html>
