<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0c0a08"/>

  <!-- Grid pattern (background) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#grid)"/>

  <!-- ₹ symbol - large, centered -->
  <text
    x="256"
    y="310"
    font-family="serif"
    font-size="260"
    font-weight="600"
    fill="none"
    stroke="#c9a84c"
    stroke-width="6"
    text-anchor="middle"
    opacity="0.9">₹</text>

  <!-- Small cloud accent top-right -->
  <ellipse cx="390" cy="130" rx="44" ry="28" fill="rgba(201,168,76,0.15)" />
  <ellipse cx="365" cy="140" rx="34" ry="24" fill="rgba(201,168,76,0.15)" />
  <ellipse cx="415" cy="145" rx="30" ry="22" fill="rgba(201,168,76,0.15)" />

  <!-- Top shimmer line -->
  <line x1="80" y1="0" x2="430" y2="0" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>
</svg>
